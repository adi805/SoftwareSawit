name: User Testing - Electron GUI Tests

on:
  workflow_dispatch:
    inputs:
      test_areas:
        description: 'Test areas to run (comma-separated: login,dashboard,kas,bank,gudang,sync,approval,all)'
        required: false
        default: 'all'
      screenshot_mode:
        description: 'Screenshot capture mode (all, failures, none)'
        required: false
        default: 'all'
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  NODE_VERSION: '20'
  TEST_TIMEOUT: 1800000

jobs:
  user-tests:
    runs-on: windows-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        test-group: [auth, transactions, sync, approval]
        include:
          - test-group: auth
            test-pattern: 'login,user-mgmt,roles'
            description: 'Authentication & User Management'
          - test-group: transactions
            test-pattern: 'kas,bank,gudang'
            description: 'Transaction CRUD Operations'
          - test-group: sync
            test-pattern: 'sync,conflict,queue'
            description: 'Sync & Conflict Resolution'
          - test-group: approval
            test-pattern: 'approval,revision'
            description: 'Approval Workflows'

    name: ${{ matrix.description }} Tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Debug environment
        run: |
          Write-Host "Node version:"
          node --version
          Write-Host "npm version:"
          npm --version
        shell: pwsh

      - name: Install dependencies
        run: |
          if (Test-Path "package-lock.json") {
            npm ci --legacy-peer-deps
          } else {
            npm install --legacy-peer-deps
          }
        shell: pwsh

      - name: Verify dependencies installed
        run: |
          if (Test-Path "node_modules") {
            Write-Host "node_modules installed"
          } else {
            exit 1
          }
        shell: pwsh

      - name: Install Playwright
        run: |
          npx playwright install chromium
          npx playwright install-deps chromium
        shell: pwsh

      - name: Build application
        run: |
          npm run build
        shell: pwsh
        timeout-minutes: 10

      - name: Create test directories
        run: |
          New-Item -ItemType Directory -Force -Path "test-results"
          New-Item -ItemType Directory -Force -Path "test-results/screenshots"
          New-Item -ItemType Directory -Force -Path "test-results/reports"
          New-Item -ItemType Directory -Force -Path "test-results/logs"
        shell: pwsh

      - name: Setup test database directories
        run: |
          $dbBase = "$env:APPDATA\SoftwareSawit"
          $dbData = "$dbBase\data"
          $dbMaster = "$dbData\master"
          $dbYear = Get-Date -Format "yyyy"
          
          New-Item -ItemType Directory -Force -Path $dbMaster
          New-Item -ItemType Directory -Force -Path "$dbData\kas\$dbYear"
          New-Item -ItemType Directory -Force -Path "$dbData\bank\$dbYear"
          New-Item -ItemType Directory -Force -Path "$dbData\gudang\$dbYear"
          
          Write-Host "Database directories created at $dbData"
        shell: pwsh

      - name: Seed test data
        run: |
          npm install --save-dev better-sqlite3 --legacy-peer-deps
          
          node << 'ENDOFNODE'
          const Database = require('better-sqlite3');
          const fs = require('fs');
          const path = require('path');
          
          const base = process.env.APPDATA + '\\SoftwareSawit\\data';
          const year = new Date().getFullYear().toString();
          const month = String(new Date().getMonth() + 1).padStart(2, '0');
          
          function ensureDir(dir) {
            if (!fs.existsSync(dir)) fs.mkdirSync(dir, {recursive:true});
          }
          
          // COA database
          ensureDir(base + '\\master');
          const coaDb = new Database(base + '\\master\\coa.db');
          coaDb.exec("CREATE TABLE IF NOT EXISTS coa (id TEXT, kode TEXT, nama TEXT, tipe TEXT, parent_id TEXT, status_aktif INTEGER DEFAULT 1, created_at TEXT, updated_at TEXT)");
          coaDb.exec("INSERT OR IGNORE INTO coa VALUES ('1','1-1000','Kas','Aktiva Lancar',NULL,1,datetime('now'),datetime('now'))");
          coaDb.exec("INSERT OR IGNORE INTO coa VALUES ('2','1-1100','Bank','Aktiva Lancar','1',1,datetime('now'),datetime('now'))");
          coaDb.exec("INSERT OR IGNORE INTO coa VALUES ('3','1-1200','Piutang','Aktiva Lancar','1',1,datetime('now'),datetime('now'))");
          coaDb.exec("INSERT OR IGNORE INTO coa VALUES ('4','2-1000','Utang Usaha','Utang Lancar',NULL,1,datetime('now'),datetime('now'))");
          coaDb.exec("INSERT OR IGNORE INTO coa VALUES ('5','3-1000','Modal','Ekuitas',NULL,1,datetime('now'),datetime('now'))");
          coaDb.exec("INSERT OR IGNORE INTO coa VALUES ('6','4-1000','Pendapatan','Pendapatan',NULL,1,datetime('now'),datetime('now'))");
          coaDb.exec("INSERT OR IGNORE INTO coa VALUES ('7','5-1000','Beban Gaji','Beban',NULL,1,datetime('now'),datetime('now'))");
          coaDb.exec("CREATE TABLE IF NOT EXISTS aspek_kerja (id TEXT, kode TEXT, nama TEXT, coa_id TEXT, jenis TEXT, status_aktif INTEGER DEFAULT 1)");
          coaDb.exec("INSERT OR IGNORE INTO aspek_kerja VALUES ('1','AK01','Panen','1','Operasional',1)");
          coaDb.exec("INSERT OR IGNORE INTO aspek_kerja VALUES ('2','AK02','Pemeliharaan','1','Operasional',1)");
          coaDb.exec("INSERT OR IGNORE INTO aspek_kerja VALUES ('3','AK03','Transport','1','Operasional',1)");
          coaDb.exec("CREATE TABLE IF NOT EXISTS blok (id TEXT, kode TEXT, nama TEXT, tahun_tanam INTEGER, luas REAL, pokok INTEGER, sph REAL, bulan_tanam TEXT)");
          coaDb.exec("INSERT OR IGNORE INTO blok VALUES ('1','B01','Blok A',2025,10.5,1050,100,'Januari')");
          coaDb.exec("INSERT OR IGNORE INTO blok VALUES ('2','B02','Blok B',2025,8.2,820,100,'Februari')");
          coaDb.exec("INSERT OR IGNORE INTO blok VALUES ('3','B03','Blok C',2024,12.0,1200,100,'Maret')");
          coaDb.close();
          console.log("Seeded COA");
          
          // Kas
          ensureDir(base + '\\kas\\' + year);
          const kasDb = new Database(base + '\\kas\\' + year + '\\' + month + '.db');
          kasDb.exec("CREATE TABLE IF NOT EXISTS transactions (id TEXT, transaction_number TEXT, transaction_date TEXT, transaction_type TEXT, amount REAL, description TEXT, coa_id TEXT, aspek_kerja_id TEXT, blok_id TEXT, status TEXT, created_by TEXT)");
          kasDb.exec("INSERT OR IGNORE INTO transactions VALUES ('1','KAS-001','2026-01-15','Kas Masuk',500000,'Test Kas 1','1',NULL,NULL,'Pending Approval 1','admin')");
          kasDb.exec("INSERT OR IGNORE INTO transactions VALUES ('2','KAS-002','2026-01-20','Kas Keluar',300000,'Test Kas 2','2',NULL,NULL,'Fully Approved','admin')");
          kasDb.close();
          console.log("Seeded Kas");
          
          // Bank
          ensureDir(base + '\\bank\\' + year);
          const bankDb = new Database(base + '\\bank\\' + year + '\\' + month + '.db');
          bankDb.exec("CREATE TABLE IF NOT EXISTS transactions (id TEXT, transaction_number TEXT, transaction_date TEXT, transaction_type TEXT, amount REAL, description TEXT, coa_id TEXT, aspek_kerja_id TEXT, blok_id TEXT, status TEXT, created_by TEXT)");
          bankDb.exec("INSERT OR IGNORE INTO transactions VALUES ('1','BANK-001','2026-01-15','Bank Masuk',500000,'Test Bank 1','1',NULL,NULL,'Pending Approval 1','admin')");
          bankDb.exec("INSERT OR IGNORE INTO transactions VALUES ('2','BANK-002','2026-01-20','Bank Keluar',300000,'Test Bank 2','2',NULL,NULL,'Fully Approved','admin')");
          bankDb.close();
          console.log("Seeded Bank");
          
          // Gudang
          ensureDir(base + '\\gudang\\' + year);
          const gudangDb = new Database(base + '\\gudang\\' + year + '\\' + month + '.db');
          gudangDb.exec("CREATE TABLE IF NOT EXISTS transactions (id TEXT, transaction_number TEXT, transaction_date TEXT, transaction_type TEXT, amount REAL, description TEXT, coa_id TEXT, aspek_kerja_id TEXT, blok_id TEXT, status TEXT, created_by TEXT)");
          gudangDb.exec("INSERT OR IGNORE INTO transactions VALUES ('1','GUDANG-001','2026-01-15','Gudang Masuk',500000,'Test Gudang 1','1',NULL,NULL,'Pending Approval 1','admin')");
          gudangDb.exec("INSERT OR IGNORE INTO transactions VALUES ('2','GUDANG-002','2026-01-20','Gudang Keluar',300000,'Test Gudang 2','2',NULL,NULL,'Fully Approved','admin')");
          gudangDb.close();
          console.log("Seeded Gudang");
          
          console.log("All test data seeded successfully!");
          ENDOFNODE
        shell: pwsh

      - name: Run user tests
        id: run_tests
        run: |
          $env:TEST_AREAS = "${{ github.event.inputs.test_areas || 'all' }}"
          $env:SCREENSHOT_MODE = "${{ github.event.inputs.screenshot_mode || 'all' }}"
          $env:TEST_GROUP = "${{ matrix.test-group }}"
          $env:TEST_PATTERN = "${{ matrix.test-pattern }}"
          
          if (Test-Path ".github/scripts/run-user-tests.js") {
            node .github/scripts/run-user-tests.js
          } else {
            New-Item -ItemType Directory -Force -Path "test-results/reports"
            @{ summary = @{ total = 0; passed = 0; failed = 0; skipped = 0; duration = 0 }; results = @() } | ConvertTo-Json | Out-File -FilePath "test-results/reports/test-report.json"
          }
        shell: pwsh
        timeout-minutes: 30
        continue-on-error: true

      - name: Capture final screenshots
        if: always()
        run: |
          Get-ChildItem -Path "test-results" -Recurse -File | Where-Object { $_.Extension -eq ".png" }
        shell: pwsh

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.test-group }}-${{ github.run_id }}
          path: |
            test-results/screenshots/
            test-results/reports/
            test-results/logs/
            test-results/*.json
            test-results/*.html
            *.log
            electron-*.log
          retention-days: 30
          if-no-files-found: warn

      - name: Process test results
        if: always()
        id: process_results
        run: |
          $reportPath = "test-results/reports/test-report.json"
          if (Test-Path $reportPath) {
            $report = Get-Content $reportPath | ConvertFrom-Json
            "total=$($report.summary.total)" >> $env:GITHUB_OUTPUT
            "passed=$($report.summary.passed)" >> $env:GITHUB_OUTPUT
            "failed=$($report.summary.failed)" >> $env:GITHUB_OUTPUT
            "skipped=$($report.summary.skipped)" >> $env:GITHUB_OUTPUT
            "duration=$($report.summary.duration)" >> $env:GITHUB_OUTPUT
          } else {
            "total=0" >> $env:GITHUB_OUTPUT
            "passed=0" >> $env:GITHUB_OUTPUT
            "failed=1" >> $env:GITHUB_OUTPUT
            "skipped=0" >> $env:GITHUB_OUTPUT
            "duration=0" >> $env:GITHUB_OUTPUT
          }
        shell: pwsh

      - name: Post test summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'test-results/reports/test-report.json';
            let summary = '## Test Results Unavailable';
            if (fs.existsSync(reportPath)) {
              const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              summary = `## Test Results\n\n| Passed | Failed | Skipped | Total |\n|--------|--------|---------|-------|\n| ${report.summary.passed} | ${report.summary.failed} | ${report.summary.skipped} | ${report.summary.total} |`;
            }
            await core.summary.addRaw(summary).write();

      - name: Check test results
        if: always()
        run: |
          $failed = "${{ steps.process_results.outputs.failed }}"
          if ($failed -gt 0) { exit 1 }
        shell: pwsh

  aggregate-results:
    needs: user-tests
    runs-on: windows-latest
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-test-results
          pattern: test-results-*

      - name: Aggregate test reports
        run: |
          $aggregateReport = @{
            summary = @{ total = 0; passed = 0; failed = 0; skipped = 0 }
          }
          Get-ChildItem -Path "all-test-results" -Directory | ForEach-Object {
            $reportPath = Join-Path $_.FullName "reports/test-report.json"
            if (Test-Path $reportPath) {
              $report = Get-Content $reportPath | ConvertFrom-Json
              $aggregateReport.summary.total += $report.summary.total
              $aggregateReport.summary.passed += $report.summary.passed
              $aggregateReport.summary.failed += $report.summary.failed
              $aggregateReport.summary.skipped += $report.summary.skipped
            }
          }
          $aggregateReport | ConvertTo-Json | Out-File -FilePath "all-test-results/aggregate-report.json"
          Write-Host "Total: $($aggregateReport.summary.total) Passed: $($aggregateReport.summary.passed) Failed: $($aggregateReport.summary.failed)"
        shell: pwsh

      - name: Upload aggregate report
        uses: actions/upload-artifact@v4
        with:
          name: aggregate-test-report-${{ github.run_id }}
          path: all-test-results/
          retention-days: 30

      - name: Post aggregate summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'all-test-results/aggregate-report.json';
            if (fs.existsSync(reportPath)) {
              const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              const { summary } = report;
              const passRate = summary.total > 0 ? ((summary.passed / summary.total) * 100).toFixed(1) : 0;
              await core.summary.addRaw(`## Summary\n\n| Passed | Failed | Skipped | Total | Pass Rate |\n|--------|--------|---------|-------|------------|\n| ${summary.passed} | ${summary.failed} | ${summary.skipped} | ${summary.total} | ${passRate}% |`).write();
            }

      - name: Check overall results
        run: |
          $reportPath = "all-test-results/aggregate-report.json"
          if (Test-Path $reportPath) {
            $report = Get-Content $reportPath | ConvertFrom-Json
            if ($report.summary.failed -gt 0) { exit 1 }
          }
        shell: pwsh
