name: User Testing - Electron GUI Tests

on:
  workflow_dispatch:
    inputs:
      test_areas:
        description: 'Test areas to run (comma-separated: login,dashboard,kas,bank,gudang,sync,approval,all)'
        required: false
        default: 'all'
      screenshot_mode:
        description: 'Screenshot capture mode (all, failures, none)'
        required: false
        default: 'all'
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  NODE_VERSION: '22.10.7'
  TEST_TIMEOUT: 1800000  # 30 minutes
  ELECTRON_ENABLE_LOGGING: true
  ELECTRON_ENABLE_STACK_DUMPING: true
  DEBUG: 'electron:*'

jobs:
  user-tests:
    runs-on: windows-latest
    timeout-minutes: 45
    
    strategy:
      fail-fast: false
      matrix:
        test-group: [auth, transactions, sync, approval]
        include:
          - test-group: auth
            test-pattern: 'login,user-mgmt,roles'
            description: 'Authentication & User Management'
          - test-group: transactions
            test-pattern: 'kas,bank,gudang'
            description: 'Transaction CRUD Operations'
          - test-group: sync
            test-pattern: 'sync,conflict,queue'
            description: 'Sync & Conflict Resolution'
          - test-group: approval
            test-pattern: 'approval,revision'
            description: 'Approval Workflows'

    name: ${{ matrix.description }} Tests
    
    steps:
      # ==========================================
      # 1. Checkout and Setup
      # ==========================================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # ==========================================
      # 2. Install Dependencies
      # ==========================================
      - name: Install dependencies
        run: |
          npm install
        shell: pwsh

      - name: Install Playwright
        run: |
          npx playwright install chromium
          npx playwright install-deps chromium
        shell: pwsh

      # ==========================================
      # 3. Build Application
      # ==========================================
      - name: Build application
        run: |
          npm run build
        shell: pwsh
        timeout-minutes: 10

      # ==========================================
      # 4. Setup Test Environment
      # ==========================================
      - name: Create test directories
        run: |
          New-Item -ItemType Directory -Force -Path "test-results"
          New-Item -ItemType Directory -Force -Path "test-results/screenshots"
          New-Item -ItemType Directory -Force -Path "test-results/videos"
          New-Item -ItemType Directory -Force -Path "test-results/reports"
          New-Item -ItemType Directory -Force -Path "test-results/logs"
        shell: pwsh

      - name: Setup test database
        run: |
          # Create test data directory
          New-Item -ItemType Directory -Force -Path "data"
          
          # Copy seed data if exists
          if (Test-Path "test/seed-data") {
            Copy-Item -Path "test/seed-data/*" -Destination "data/" -Recurse -Force
          }
        shell: pwsh

      # ==========================================
      # 5. Run User Tests with Playwright
      # ==========================================
      - name: Run user tests
        id: run_tests
        run: |
          $env:TEST_AREAS = "${{ github.event.inputs.test_areas || 'all' }}"
          $env:SCREENSHOT_MODE = "${{ github.event.inputs.screenshot_mode || 'all' }}"
          $env:TEST_GROUP = "${{ matrix.test-group }}"
          $env:TEST_PATTERN = "${{ matrix.test-pattern }}"
          
          node .github/scripts/run-user-tests.js
        shell: pwsh
        timeout-minutes: 30
        continue-on-error: true

      # ==========================================
      # 6. Capture Screenshots on Failure
      # ==========================================
      - name: Capture final screenshots
        if: always()
        run: |
          # Screenshot capture is handled by the test script
          # This step ensures any remaining screenshots are saved
          Get-ChildItem -Path "test-results" -Recurse | Where-Object { $_.Extension -eq ".png" } | ForEach-Object {
            Write-Host "Screenshot saved: $($_.FullName)"
          }
        shell: pwsh

      # ==========================================
      # 7. Upload Artifacts
      # ==========================================
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.test-group }}-${{ github.run_id }}
          path: |
            test-results/screenshots/
            test-results/reports/
            test-results/logs/
            test-results/*.json
            test-results/*.html
            *.log
            electron-*.log
          retention-days: 30
          if-no-files-found: warn

      # ==========================================
      # 8. Process Test Results
      # ==========================================
      - name: Process test results
        if: always()
        id: process_results
        run: |
          $reportPath = "test-results/reports/test-report.json"
          
          if (Test-Path $reportPath) {
            $report = Get-Content $reportPath | ConvertFrom-Json
            
            Write-Host "::set-output name=total::$( $report.summary.total )"
            Write-Host "::set-output name=passed::$( $report.summary.passed )"
            Write-Host "::set-output name=failed::$( $report.summary.failed )"
            Write-Host "::set-output name=skipped::$( $report.summary.skipped )"
            Write-Host "::set-output name=duration::$( $report.summary.duration )"
            
            # Set job output
            "total=$( $report.summary.total )" >> $env:GITHUB_OUTPUT
            "passed=$( $report.summary.passed )" >> $env:GITHUB_OUTPUT
            "failed=$( $report.summary.failed )" >> $env:GITHUB_OUTPUT
            "skipped=$( $report.summary.skipped )" >> $env:GITHUB_OUTPUT
            "duration=$( $report.summary.duration )" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Test report not found!"
            "total=0" >> $env:GITHUB_OUTPUT
            "passed=0" >> $env:GITHUB_OUTPUT
            "failed=1" >> $env:GITHUB_OUTPUT
            "skipped=0" >> $env:GITHUB_OUTPUT
            "duration=0" >> $env:GITHUB_OUTPUT
          }
        shell: pwsh

      # ==========================================
      # 9. Post Test Summary
      # ==========================================
      - name: Post test summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const reportPath = path.join(process.cwd(), 'test-results', 'reports', 'test-report.json');
            let summary = '## Test Results Unavailable';
            
            if (fs.existsSync(reportPath)) {
              const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              const { summary: reportSummary, results } = report;
              
              const passedIcon = '✅';
              const failedIcon = '❌';
              const skippedIcon = '⏭️';
              
              summary = `## ${{ matrix.description }} Test Results
            
            | Metric | Count |
            |--------|-------|
            | ${passedIcon} Passed | ${reportSummary.passed} |
            | ${failedIcon} Failed | ${reportSummary.failed} |
            | ${skippedIcon} Skipped | ${reportSummary.skipped} |
            | 📊 Total | ${reportSummary.total} |
            | ⏱️ Duration | ${(reportSummary.duration / 1000).toFixed(2)}s |
            
            ### Test Areas
            `;
              
              // Group results by area
              const byArea = {};
              for (const result of results) {
                const area = result.area || 'General';
                if (!byArea[area]) {
                  byArea[area] = { passed: 0, failed: 0, total: 0 };
                }
                byArea[area].total++;
                if (result.status === 'passed') {
                  byArea[area].passed++;
                } else if (result.status === 'failed') {
                  byArea[area].failed++;
                }
              }
              
              for (const [area, stats] of Object.entries(byArea)) {
                const icon = stats.failed > 0 ? failedIcon : passedIcon;
                summary += `- ${icon} **${area}**: ${stats.passed}/${stats.total} passed`;
                if (stats.failed > 0) {
                  summary += ` (${stats.failed} failed)`;
                }
                summary += '\n';
              }
              
              // Add failed test details
              const failedTests = results.filter(r => r.status === 'failed');
              if (failedTests.length > 0) {
                summary += '\n### Failed Tests\n';
                for (const test of failedTests.slice(0, 10)) {
                  summary += `- ❌ ${test.name}: ${test.error || 'No error message'}\n`;
                }
                if (failedTests.length > 10) {
                  summary += `- ... and ${failedTests.length - 10} more\n`;
                }
              }
              
              // Add screenshots link
              summary += `\n### Artifacts\n`;
              summary += `- 📸 Screenshots: See uploaded artifacts\n`;
              summary += `- 📄 Full Report: 	est-results/reports/test-report.json\n`;
            }
            
            // Post as step summary
            await core.summary.addRaw(summary).write();
            
            // Also post as PR comment if in PR context
            if (context.payload.pull_request) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: summary
              });
            }

      # ==========================================
      # 10. Fail Job if Tests Failed
      # ==========================================
      - name: Check test results
        if: always()
        run: |
          $failed = "${{ steps.process_results.outputs.failed }}"
          if ($failed -gt 0) {
            Write-Host "Tests failed: $failed"
            exit 1
          }
        shell: pwsh

  # ==========================================
  # Aggregate Results Job
  # ==========================================
  aggregate-results:
    needs: user-tests
    runs-on: windows-latest
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-test-results
          pattern: test-results-*

      - name: Aggregate test reports
        run: |
          $aggregateReport = @{
            timestamp = Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ"
            run_id = "${{ github.run_id }}"
            sha = "${{ github.sha }}"
            ref = "${{ github.ref }}"
            summary = @{
              total = 0
              passed = 0
              failed = 0
              skipped = 0
              duration = 0
            }
            groups = @()
          }
          
          Get-ChildItem -Path "all-test-results" -Directory | ForEach-Object {
            $reportPath = Join-Path $_.FullName "reports/test-report.json"
            if (Test-Path $reportPath) {
              $report = Get-Content $reportPath | ConvertFrom-Json
              $aggregateReport.summary.total += $report.summary.total
              $aggregateReport.summary.passed += $report.summary.passed
              $aggregateReport.summary.failed += $report.summary.failed
              $aggregateReport.summary.skipped += $report.summary.skipped
              $aggregateReport.summary.duration += $report.summary.duration
              $aggregateReport.groups += @{
                name = $_.Name
                summary = $report.summary
                results = $report.results
              }
            }
          }
          
          $aggregateReport | ConvertTo-Json -Depth 10 | Out-File -FilePath "all-test-results/aggregate-report.json" -Encoding UTF8
          
          Write-Host "Total tests: $($aggregateReport.summary.total)"
          Write-Host "Passed: $($aggregateReport.summary.passed)"
          Write-Host "Failed: $($aggregateReport.summary.failed)"
          Write-Host "Skipped: $($aggregateReport.summary.skipped)"
        shell: pwsh

      - name: Upload aggregate report
        uses: actions/upload-artifact@v4
        with:
          name: aggregate-test-report-${{ github.run_id }}
          path: all-test-results/
          retention-days: 30

      - name: Post aggregate summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const reportPath = path.join(process.cwd(), 'all-test-results', 'aggregate-report.json');
            
            if (fs.existsSync(reportPath)) {
              const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              const { summary } = report;
              
              const passRate = summary.total > 0 ? ((summary.passed / summary.total) * 100).toFixed(1) : 0;
              
              const summary_text = `## 🧪 Complete Test Suite Results
            
            | Metric | Count | Percentage |
            |--------|-------|------------|
            | ✅ Passed | ${summary.passed} | ${passRate}% |
            | ❌ Failed | ${summary.failed} | ${summary.total > 0 ? ((summary.failed / summary.total) * 100).toFixed(1) : 0}% |
            | ⏭️ Skipped | ${summary.skipped} | ${summary.total > 0 ? ((summary.skipped / summary.total) * 100).toFixed(1) : 0}% |
            | 📊 Total | ${summary.total} | 100% |
            | ⏱️ Total Duration | ${(summary.duration / 1000).toFixed(2)}s | - |
            
            ### Test Groups
            ${report.groups.map(g => {
              const gPassRate = g.summary.total > 0 ? ((g.summary.passed / g.summary.total) * 100).toFixed(1) : 0;
              const icon = g.summary.failed > 0 ? '❌' : '✅';
              return `- ${icon} **${g.name}**: ${g.summary.passed}/${g.summary.total} (${gPassRate}%)`;
            }).join('\n')}
            
            ---
            Run ID: ${report.run_id}
            Commit: ${report.sha}
            `;
              
              await core.summary.addRaw(summary_text).write();
            }

      - name: Check overall results
        run: |
          $reportPath = "all-test-results/aggregate-report.json"
          if (Test-Path $reportPath) {
            $report = Get-Content $reportPath | ConvertFrom-Json
            if ($report.summary.failed -gt 0) {
              Write-Host "Some tests failed!"
              exit 1
            }
          }
        shell: pwsh
