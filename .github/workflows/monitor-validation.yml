name: Monitor Validation State

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Specific workflow run ID to process (optional)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (do not update validation state)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  NODE_VERSION: '22'

jobs:
  # ==========================================
  # Job 1: Monitor GitHub Actions and Update State
  # ==========================================
  monitor-and-update:
    runs-on: windows-latest
    name: Monitor GitHub Actions Runs

    outputs:
      state_changed: ${{ steps.update_state.outputs.changed }}
      passed_count: ${{ steps.update_state.outputs.passed }}
      failed_count: ${{ steps.update_state.outputs.failed }}
      total_count: ${{ steps.update_state.outputs.total }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # ==========================================
      # Setup Monitor Environment
      # ==========================================
      - name: Create monitor directories
        run: |
          New-Item -ItemType Directory -Force -Path ".monitor/artifacts"
          New-Item -ItemType Directory -Force -Path ".monitor/logs"
          New-Item -ItemType Directory -Force -Path ".monitor/reports"
        shell: pwsh

      # ==========================================
      # Query GitHub Actions API
      # ==========================================
      - name: Query GitHub Actions
        id: query_actions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github.v3+json"
          }

          # Get recent workflow runs for user-testing.yml
          $runsUrl = "https://api.github.com/repos/$env:GITHUB_REPO/actions/workflows/user-testing.yml/runs?per_page=5"
          $runs = Invoke-RestMethod -Uri $runsUrl -Headers $headers

          Write-Host "Recent workflow runs:"
          foreach ($run in $runs.workflow_runs) {
            Write-Host "  - Run #$($run.run_number) - $($run.conclusion) - $($run.head_sha.Substring(0,7))"
          }

          # Store latest run info
          if ($runs.workflow_runs.Count -gt 0) {
            $latestRun = $runs.workflow_runs[0]
            Write-Host "::set-output name=latest_run_id::$($latestRun.id)"
            Write-Host "::set-output name=latest_conclusion::$($latestRun.conclusion)"
            Write-Host "## Latest Run: #$($latestRun.run_number) - $($latestRun.conclusion)"
          }
        shell: pwsh

      # ==========================================
      # Download Artifacts from Latest Run
      # ==========================================
      - name: Download artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github.v3+json"
          }

          # Get artifacts from latest completed run
          $artifactsUrl = "https://api.github.com/repos/$env:GITHUB_REPO/actions/runs/${{ steps.query_actions.outputs.latest_run_id }}/artifacts"
          $artifacts = Invoke-RestMethod -Uri $artifactsUrl -Headers $headers

          Write-Host "Found $($artifacts.total_count) artifacts"

          # Download each artifact
          foreach ($artifact in $artifacts.artifacts) {
            Write-Host "Downloading artifact: $($artifact.name)"
            $downloadUrl = $artifact.archive_download_url
            $headers.Download = "application/vnd.github.v3+json"
            Invoke-WebRequest -Uri $downloadUrl -Headers $headers -OutFile "$($artifact.name).zip"
            Expand-Archive -Path "$($artifact.name).zip" -DestinationPath ".monitor/artifacts/" -Force
          }
        shell: pwsh
        continue-on-error: true

      # ==========================================
      # Process Results and Update State
      # ==========================================
      - name: Update validation state
        id: update_state
        run: |
          # Look for aggregate report in artifacts
          $reportPath = $null
          Get-ChildItem -Path ".monitor/artifacts" -Recurse -Filter "aggregate-report.json" | ForEach-Object {
            $reportPath = $_.FullName
          }

          # Check if report exists
          if (-not $reportPath) {
            Write-Host "No aggregate report found"
            "changed=false" >> $env:GITHUB_OUTPUT
            "total=0" >> $env:GITHUB_OUTPUT
            "passed=0" >> $env:GITHUB_OUTPUT
            "failed=0" >> $env:GITHUB_OUTPUT
            "pending=0" >> $env:GITHUB_OUTPUT
            exit 0
          }

          Write-Host "Found report at: $reportPath"

          # Read report
          $report = Get-Content $reportPath | ConvertFrom-Json

          # Calculate statistics
          $total = $report.summary.total
          $passed = $report.summary.passed
          $failed = $report.summary.failed
          $pending = $report.summary.pending
          $passRate = if ($total -gt 0) { [math]::Round(($passed / $total) * 100, 1) } else { 0 }

          # Output statistics
          "changed=true" >> $env:GITHUB_OUTPUT
          "total=$total" >> $env:GITHUB_OUTPUT
          "passed=$passed" >> $env:GITHUB_OUTPUT
          "failed=$failed" >> $env:GITHUB_OUTPUT
          "pending=$pending" >> $env:GITHUB_OUTPUT
          "pass_rate=$passRate" >> $env:GITHUB_OUTPUT

          Write-Host "Validation State Summary:"
          Write-Host "  Total: $total"
          Write-Host "  Passed: $passed ($passRate%)"
          Write-Host "  Failed: $failed"
          Write-Host "  Pending: $pending"
        shell: pwsh

      # ==========================================
      # Upload Monitor Logs
      # ==========================================
      - name: Upload monitor logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-logs-${{ github.run_id }}
          path: |
            .monitor/logs/
            .monitor/reports/
          retention-days: 30
          if-no-files-found: warn

  # ==========================================
  # Job 2: Post Summary
  # ==========================================
  post-summary:
    needs: monitor-and-update
    runs-on: windows-latest
    name: Post Summary
    if: always()

    steps:
      - name: Post workflow summary
        uses: actions/github-script@v7
        with:
          script: |
            const total = '${{ needs.monitor-and-update.outputs.total_count }}' || '0';
            const passed = '${{ needs.monitor-and-update.outputs.passed_count }}' || '0';
            const failed = '${{ needs.monitor-and-update.outputs.failed_count }}' || '0';
            const passRate = total > 0 ? ((passed / total) * 100).toFixed(1) : 0;

            const summary = `## Validation State Monitor

            ### Current Status
            | Metric | Count | Percentage |
            |--------|-------|------------|
            | Passed | ${passed} | ${passRate}% |
            | Failed | ${failed} | ${total > 0 ? ((failed / total) * 100).toFixed(1) : 0}% |
            | Total | ${total} | 100% |

            ### Actions Taken
            - Monitored GitHub Actions workflow runs
            - Processed test artifacts and results
            - ${'${{ needs.monitor-and-update.outputs.state_changed }}' === 'true' ? 'Created PR to update validation state' : 'No changes to validation state'}

            ### Links
            - [View Workflow Runs](https://github.com/${{ github.repository }}/actions/workflows/user-testing.yml)
            `;

            await core.summary.addRaw(summary).write();
